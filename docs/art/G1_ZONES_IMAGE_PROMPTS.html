// ═══════════════════════════════════════════════════════════════════════════
//  BUILDERS
// ═══════════════════════════════════════════════════════════════════════════
let counter = 0;
function palBlock(zone){
  const lines = Object.entries(zone.pal).map(([k,v]) => k + ': ' + v.join(', ')).join('. ');
  return `[ZONE PALETTE — use only these] ${lines}. ${SHARED}`;
}
function card(zone, placement, cls, title, file, body){
  const full = STYLE + '\n\n' + palBlock(zone) + '\n\n' + body;
  const id = 'p' + (counter++);
  return `<div class="prompt-card">
    <button class="copy-btn" onclick="copyPrompt('${id}', this)">Copy</button>
    <div class="placement ${cls}">${placement}</div>
    <div class="title">${title}</div>
    <div class="file">apps/web/public/art/g1/${zone.dir}/${file} <span class="dims">· 48×48 shipping (author at 512×512)</span></div>
    <div class="prompt-text" id="${id}">${full}</div>
  </div>`;
}
function sw(hex){ return `<div class="sw"><div class="chip" style="background:${hex}"></div><div class="hex">${hex}</div></div>`; }

function buildStartHere(){
  return `<div class="section active" id="sec-start">
    <h2>▶ START HERE — read this once, then work zone by zone</h2>
    <p>This library holds the image-generation prompts for <strong>all remaining Grade-1 zones (z02–z15)</strong> of "The Lost Pages". Zone z01 (School) has its own file — <code>docs/art/G1_SCHOOL_IMAGE_PROMPTS.html</code> — and it is the <strong>backbone: do School first</strong>, because its <code>_style_key.png</code> is the reference image you feed into every generation here.</p>

    <div class="info-box blue"><strong>The order of work (signpost):</strong>
      <br><strong>1.</strong> Finish the School zone from the other file (style key → tiles → props → Finn).
      <br><strong>2.</strong> Pick any zone tab above. Each zone needs only <strong>3–5 images</strong> (floor, wall, and its signature props) — everything else (sparkle, Finn, Pixel, player) is shared or on hold.
      <br><strong>3.</strong> Drop finished PNGs into the iCloud folder <code>DomiGo v2 Art Prompts/generated-images/g1-&lt;zone&gt;/</code> (e.g. <code>g1-zoo/</code>).
      <br><strong>4.</strong> A Claude session runs the sync + QA tools and the images appear in the game — the engine falls back to the procedural art for anything you haven't generated yet, so partial zones always still run.</div>

    <div class="info-box red"><strong>Three non-negotiables (identical to the School file — they break the engine if ignored):</strong>
      <br>1. <strong>NO text</strong> anywhere in any image — no letters, numbers, logos.
      <br>2. <strong>Floor &amp; wall tiles must be SEAMLESS</strong> — the same tile repeats across a grid: no centred motif, no vignette, even brightness corner-to-corner.
      <br>3. <strong>Props sit on a FULLY TRANSPARENT background</strong> — only a small hard contact-shadow oval may touch the ground.</div>

    <div class="info-box amber"><strong>Shared assets — generate ONCE, reuse everywhere.</strong> The green encounter sparkle ✦, Finn, and Pixel are the <em>same</em> images in every zone (that sameness is what makes 15 rooms feel like one game). Generate them once via the School file, then the sync tool copies the approved PNGs into each zone folder. Player sprites stay ⏸ ON HOLD (per-student procedural avatars are a feature — LOOK-0).</div>

    <h3>What each zone needs (the whole checklist)</h3>
    <div class="spec">REQUIRED per zone   floor.png · wall.png · the zone's signature props (listed on its tab)
SHARED (copy in)    sparkle.png · finn_down.png · pixel_down.png (from School)
ON HOLD             player_* (LOOK-0 — do not generate)
NAMING RULE         file stem = engine tile-kind (board/desk/plant/barrel/rug/stage/note);
                    desk.png → engine kind "accent2", sparkle.png → "encounter" (aliased automatically)</div>

    <h3>Why the palettes are locked</h3>
    <p>Each zone tab shows its palette as swatches. These hexes are copied <strong>1:1 from the game's procedural renderer</strong> (<code>packages/art-gen/src/theme.ts</code>) — so a zone where you've generated only the floor still looks coherent: your floor and the procedural wall share the exact same colours. That's also why every prompt ends with "use ONLY the zone palette".</p>
  </div>`;
}

function buildZone(zone){
  let h = `<div class="section" id="sec-${zone.z}">
    <div class="zone-header"><div class="ch-name">${zone.z} · ${zone.en} — ${zone.de}</div><div class="ch-sub">unit ${zone.unit} · generator <code>${zone.gen}</code> · drop folder <code>g1-${zone.dir}/</code></div></div>
    <p><em>${zone.mood}</em></p>
    <div class="swatches">${Object.values(zone.pal).flat().map(sw).join('')}</div>
    <div class="info-box">Required for this zone: <strong>${zone.cards.map(c=>c[3]).join(' · ')}</strong> — plus the shared sparkle/Finn copies (see Start Here). Feed <code>_style_key.png</code> from the School zone as a reference image with every prompt.</div>`;
  for (const [placement, cls, title, file, body] of zone.cards) h += card(zone, placement, cls, title, file, body);
  return h + '</div>';
}

function buildPipeline(){
  return `<div class="section" id="sec-pipeline">
    <h2>Pipeline — from generated image to in-game tile</h2>
    <h3>1 · Generate at 4×</h3>
    <div class="info-box amber">Author each tile/prop at <strong>512×512</strong> as crisp hard-edged pixel art (no "creative upscale/smoothing"). The prep tool downsamples to the shipping 48px with nearest-neighbour.</div>
    <h3>2 · Drop → sync → QA (a Claude session runs these)</h3>
    <div class="spec"># per zone (example: zoo)
node docs/art/sync-art.mjs --lib "…/DomiGo v2 Art Prompts/generated-images/g1-zoo" \\
                           --dest apps/web/public/art/g1/zoo
node docs/art/prep-art.mjs apps/web/public/art/g1/zoo   # sizes, seams, transparency QA</div>
    <h3>3 · QA checklist (same as School)</h3>
    <div class="spec">☐ Floor/wall: tile it 3×3 — no visible seam, no bright centre, no dark corners
☐ Props: 1px+ fully transparent ring around the art
☐ Palette: no colour outside the zone ramp
☐ No text/letters/numbers anywhere
☐ Reads at 48px (zoom the shipping PNG to 100%, not the 512px source)</div>
    <div class="info-box"><strong>Incremental by design:</strong> the resolver ships only the stems that exist. One finished floor.png upgrades one tile; everything else keeps the procedural fallback. There is no "must finish the zone" pressure — drop, sync, see it, iterate.</div>
  </div>`;
}

const sections = [
  { id:'start', label:'▶ Start Here', build: buildStartHere },
  ...ZONES.map(z => ({ id:z.z, label:`${z.z} ${z.dir}`, build: () => buildZone(z) })),
  { id:'pipeline', label:'Pipeline', build: buildPipeline },
];
document.getElementById('nav').innerHTML = sections.map((s,i) =>
  `<button data-sec="${s.id}" class="${i===0?'active':''}" onclick="showSection('${s.id}',this)">${s.label}</button>`).join('');
document.getElementById('content').innerHTML = sections.map(s => s.build()).join('');

function showSection(id, btn){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  window.scrollTo(0, 0);
}
function copyPrompt(id, btn){
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied ✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1400);
  });
}
</script>
